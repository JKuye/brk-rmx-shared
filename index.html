<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRK//RMX — Probability Break Remixer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e8e0d8; font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap');
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: #222; height: 4px; border-radius: 2px; outline: none; width: 100%; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #ff3d00; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px #ff3d0033; }

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const DB_NAME = 'brk-rmx-library';
const DB_VERSION = 2;
const STORE_NAME = 'loops';
const PATTERN_STORE = 'patterns';
const DEFAULT_STEPS = 16;
const DEFAULT_SLICES = 16;

const C = {
  bg:'#0a0a0a', surface:'#141414', border:'#222',
  accent:'#ff3d00', accentDim:'#ff3d0044', accentGlow:'#ff3d0033',
  warm:'#ff6d00', text:'#e8e0d8', textDim:'#6b635b',
  green:'#00e676', greenDim:'#00e67633', cyan:'#00bcd4',
};

// ─── IndexedDB helpers ───
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains(PATTERN_STORE)) {
        db.createObjectStore(PATTERN_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll(storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbAdd(name, arrayBuffer) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.add({
      name, audioData: arrayBuffer, addedAt: Date.now(),
      cropStart: 0, cropEnd: 1, numSlices: DEFAULT_SLICES, numSteps: DEFAULT_STEPS,
    });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(id, storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbRename(id, newName, storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (!record) return reject(new Error('Not found'));
      record.name = newName;
      const putReq = store.put(record);
      putReq.onsuccess = () => resolve();
      putReq.onerror = () => reject(putReq.error);
    };
    getReq.onerror = () => reject(getReq.error);
  });
}

// ─── localStorage helpers for shared break settings ───
function getSharedSettings(file) {
  try {
    const s = localStorage.getItem('brk-rmx-shared:' + file);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function saveSharedSettings(file, settings) {
  try {
    localStorage.setItem('brk-rmx-shared:' + file, JSON.stringify(settings));
  } catch(e) { console.error('Failed to save shared settings:', e); }
}

async function dbUpdateBreakSettings(id, settings) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (!record) return reject(new Error('Not found'));
      Object.assign(record, settings);
      const putReq = store.put(record);
      putReq.onsuccess = () => resolve();
      putReq.onerror = () => reject(putReq.error);
    };
    getReq.onerror = () => reject(getReq.error);
  });
}

async function dbAddPattern(name, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PATTERN_STORE, 'readwrite');
    const store = tx.objectStore(PATTERN_STORE);
    const req = store.add({ name, ...data, addedAt: Date.now() });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ─── Audio helpers ───
function encodeWAV(buf) {
  const nCh = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  const bps = 2, ba = nCh * bps, ds = len * ba;
  const ab = new ArrayBuffer(44 + ds), v = new DataView(ab);
  const ws = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+ds,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,nCh,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*ba,true); v.setUint16(32,ba,true);
  v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40,ds,true);
  const chs=[]; for(let c=0;c<nCh;c++) chs.push(buf.getChannelData(c));
  let o=44;
  for(let i=0;i<len;i++) for(let c=0;c<nCh;c++) {
    const s=Math.max(-1,Math.min(1,chs[c][i]));
    v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}

function heatColor(p) {
  if(p===0) return 'transparent';
  return `rgba(${Math.round(255*Math.min(1,p*1.5))},${Math.round(100*(1-p))},20,${0.15+p*0.75})`;
}

function normalizeRow(row) {
  const t=row.reduce((a,b)=>a+b,0);
  return t===0?row:row.map(v=>v/t);
}

// ─── Main App ───
function App() {
  const [rawBuffer, setRawBuffer] = useState(null);
  const [audioBuffer, setAudioBuffer] = useState(null);
  const [fileName, setFileName] = useState('');
  const [numSlices, setNumSlices] = useState(DEFAULT_SLICES);
  const [numSteps, setNumSteps] = useState(DEFAULT_STEPS);
  const [bpm, setBpm] = useState(80);
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentStep, setCurrentStep] = useState(-1);
  const [grid, setGrid] = useState(() => initGrid(DEFAULT_SLICES, DEFAULT_STEPS));
  const [swing, setSwing] = useState(0);
  const [chaos, setChaos] = useState(0);
  const [waveformData, setWaveformData] = useState(null);
  const [lastPickedSlice, setLastPickedSlice] = useState(-1);
  const [reverse, setReverse] = useState(() => Array(DEFAULT_STEPS).fill(false));
  const [volume, setVolume] = useState(0.85);
  const [isRecording, setIsRecording] = useState(false);
  const [recSeconds, setRecSeconds] = useState(0);
  const [isCapturing, setIsCapturing] = useState(false);
  const [captureSeconds, setCaptureSeconds] = useState(0);
  const [isPreviewing, setIsPreviewing] = useState(false);
  const [cropStart, setCropStart] = useState(0);
  const [cropEnd, setCropEnd] = useState(1);
  const [dragging, setDragging] = useState(null);
  // Persistent library: { id, name, audioData(ArrayBuffer), cropStart, cropEnd, numSlices, numSteps }
  const [library, setLibrary] = useState([]);
  const [sharedLibrary, setSharedLibrary] = useState([]);
  const [activeLibId, setActiveLibId] = useState(null);
  const [activeSharedId, setActiveSharedId] = useState(null);
  const [libLoading, setLibLoading] = useState(true);
  const [showLibrary, setShowLibrary] = useState(false);
  const [renamingId, setRenamingId] = useState(null);
  const [renameText, setRenameText] = useState('');
  const [renameStore, setRenameStore] = useState(STORE_NAME);
  // Patterns
  const [patterns, setPatterns] = useState([]);
  const [showPatterns, setShowPatterns] = useState(false);

  const mediaRecRef = useRef(null);
  const recChunksRef = useRef([]);
  const recTimerRef = useRef(null);
  const captureRecRef = useRef(null);
  const captureChunksRef = useRef([]);
  const captureTimerRef = useRef(null);
  const captureDestRef = useRef(null);
  const ctxRef = useRef(null);
  const gainRef = useRef(null);
  const schedulerRef = useRef(null);
  const stepRef = useRef(0);
  const gridRef = useRef(grid);
  const swingRef = useRef(swing);
  const chaosRef = useRef(chaos);
  const reverseRef = useRef(reverse);
  const bpmRef = useRef(bpm);
  const volumeRef = useRef(volume);
  const numStepsRef = useRef(numSteps);
  const previewSourceRef = useRef(null);
  const waveformContainerRef = useRef(null);

  useEffect(()=>{gridRef.current=grid},[grid]);
  useEffect(()=>{swingRef.current=swing},[swing]);
  useEffect(()=>{chaosRef.current=chaos},[chaos]);
  useEffect(()=>{reverseRef.current=reverse},[reverse]);
  useEffect(()=>{bpmRef.current=bpm},[bpm]);
  useEffect(()=>{numStepsRef.current=numSteps},[numSteps]);
  useEffect(()=>{
    volumeRef.current=volume;
    if(gainRef.current) gainRef.current.gain.value=volume;
  },[volume]);

  // Load library from IndexedDB on mount + fetch shared library
  useEffect(() => {
    (async () => {
      try {
        const items = await dbGetAll();
        setLibrary(items);
        const pats = await dbGetAll(PATTERN_STORE);
        setPatterns(pats);
      } catch(e) { console.error('Failed to load:', e); }
      setLibLoading(false);
    })();
    // Fetch shared library
    (async () => {
      try {
        const res = await fetch('library.json');
        if (!res.ok) throw new Error('No library.json');
        const list = await res.json();
        setSharedLibrary(list);
      } catch(e) { console.warn('No shared library found:', e.message); }
    })();
  }, []);

  const selectFromShared = useCallback(async (item) => {
    try {
      const res = await fetch(item.file);
      if (!res.ok) throw new Error(`Failed to load ${item.file}`);
      const ab = await res.arrayBuffer();
      const decoded = await decodeArrayBuffer(ab);
      setActiveSharedId(item.file);
      setActiveLibId(null);
      const saved = getSharedSettings(item.file);
      loadRawBuffer(decoded, item.name, {
        cropStart: saved?.cropStart ?? item.cropStart,
        cropEnd: saved?.cropEnd ?? item.cropEnd,
        numSlices: saved?.numSlices ?? item.numSlices,
        numSteps: saved?.numSteps ?? item.numSteps,
      });
    } catch(e) { console.error('Failed to load shared break:', e); }
  }, []);

  function initGrid(slices, steps) {
    const g=[];
    for(let s=0;s<steps;s++){const r=new Array(slices).fill(0);r[s%slices]=1;g.push(r);}
    return g;
  }

  function getAudioContext() {
    if(!ctxRef.current){
      ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      gainRef.current=ctxRef.current.createGain();
      gainRef.current.gain.value=volumeRef.current;
      gainRef.current.connect(ctxRef.current.destination);
      captureDestRef.current=ctxRef.current.createMediaStreamDestination();
      gainRef.current.connect(captureDestRef.current);
    }
    if(ctxRef.current.state==='suspended') ctxRef.current.resume();
    return ctxRef.current;
  }

  function generateWaveform(decoded) {
    const raw=decoded.getChannelData(0), pts=600, bs=Math.floor(raw.length/pts), wf=[];
    for(let i=0;i<pts;i++){let s=0;for(let j=0;j<bs;j++)s+=Math.abs(raw[i*bs+j]);wf.push(s/bs);}
    const mx=Math.max(...wf,0.001);
    return wf.map(v=>v/mx);
  }

  function cropBuffer(buffer, s, e) {
    const ctx=getAudioContext();
    const ss=Math.floor(s*buffer.length), se=Math.floor(e*buffer.length), len=Math.max(1,se-ss);
    const cr=ctx.createBuffer(buffer.numberOfChannels,len,buffer.sampleRate);
    for(let ch=0;ch<buffer.numberOfChannels;ch++){
      const src=buffer.getChannelData(ch),dst=cr.getChannelData(ch);
      for(let i=0;i<len;i++) dst[i]=src[ss+i];
    }
    return cr;
  }

  function loadRawBuffer(decoded, name, settings = null) {
    setRawBuffer(decoded); setFileName(name);
    if (settings) {
      setCropStart(settings.cropStart ?? 0);
      setCropEnd(settings.cropEnd ?? 1);
      if (settings.numSlices && settings.numSlices !== numSlices) {
        setNumSlices(settings.numSlices);
      }
      if (settings.numSteps && settings.numSteps !== numSteps) {
        setNumSteps(settings.numSteps);
      }
    } else {
      setCropStart(0); setCropEnd(1);
    }
    setWaveformData(generateWaveform(decoded));
    setAudioBuffer(decoded);
  }

  async function decodeArrayBuffer(arrayBuffer) {
    const ctx = getAudioContext();
    // Must copy because decodeAudioData detaches the buffer
    const copy = arrayBuffer.slice(0);
    return ctx.decodeAudioData(copy);
  }

  useEffect(()=>{
    if(rawBuffer&&(cropStart>0||cropEnd<1)) setAudioBuffer(cropBuffer(rawBuffer,cropStart,cropEnd));
    else if(rawBuffer) setAudioBuffer(rawBuffer);
  },[cropStart,cropEnd,rawBuffer]);

  const [savedFlash, setSavedFlash] = useState(false);

  const saveBreakState = useCallback(() => {
    if (activeLibId != null) {
      dbUpdateBreakSettings(activeLibId, { cropStart, cropEnd, numSlices, numSteps })
        .then(() => {
          setLibrary(prev => prev.map(x => x.id === activeLibId
            ? { ...x, cropStart, cropEnd, numSlices, numSteps } : x));
          setSavedFlash(true);
          setTimeout(() => setSavedFlash(false), 1200);
        })
        .catch(e => console.error('Settings save failed:', e));
    } else if (activeSharedId != null) {
      saveSharedSettings(activeSharedId, { cropStart, cropEnd, numSlices, numSteps });
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1200);
    }
  }, [activeLibId, activeSharedId, cropStart, cropEnd, numSlices, numSteps]);

  // ─── File handling (add to library + load) ───
  const handleFile = useCallback(async (e) => {
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    getAudioContext(); // ensure context
    let firstDecoded = null, firstName = null;
    for(const file of files) {
      try {
        const ab = await file.arrayBuffer();
        const id = await dbAdd(file.name, ab);
        const decoded = await decodeArrayBuffer(ab);
        setLibrary(prev => [...prev, { id, name: file.name, audioData: ab }]);
        if(!firstDecoded) { firstDecoded = decoded; firstName = file.name; setActiveLibId(id); }
      } catch(err) { console.error(`Failed: ${file.name}`, err); }
    }
    if(firstDecoded) loadRawBuffer(firstDecoded, firstName);
    e.target.value = ''; // reset input
  }, []);

  const selectFromLibrary = useCallback(async (item) => {
    try {
      const decoded = await decodeArrayBuffer(item.audioData);
      setActiveLibId(item.id);
      setActiveSharedId(null);
      loadRawBuffer(decoded, item.name, {
        cropStart: item.cropStart,
        cropEnd: item.cropEnd,
        numSlices: item.numSlices,
        numSteps: item.numSteps,
      });
    } catch(e) { console.error('Failed to decode:', e); }
  }, []);

  const deleteFromLibrary = useCallback(async (id) => {
    try {
      await dbDelete(id);
      setLibrary(prev => prev.filter(x => x.id !== id));
      if(activeLibId === id) {
        setRawBuffer(null); setAudioBuffer(null); setFileName('');
        setWaveformData(null); setActiveLibId(null);
      }
    } catch(e) { console.error('Delete failed:', e); }
  }, [activeLibId]);

  const deletePattern = useCallback(async (id) => {
    try {
      await dbDelete(id, PATTERN_STORE);
      setPatterns(prev => prev.filter(x => x.id !== id));
    } catch(e) { console.error('Delete pattern failed:', e); }
  }, []);

  const startRename = useCallback((item, store = STORE_NAME) => {
    setRenamingId(item.id);
    setRenameText(item.name);
    setRenameStore(store);
  }, []);

  const confirmRename = useCallback(async () => {
    if(!renamingId || !renameText.trim()) return;
    try {
      await dbRename(renamingId, renameText.trim(), renameStore);
      if (renameStore === STORE_NAME) {
        setLibrary(prev => prev.map(x => x.id === renamingId ? {...x, name: renameText.trim()} : x));
        if(activeLibId === renamingId) setFileName(renameText.trim());
      } else {
        setPatterns(prev => prev.map(x => x.id === renamingId ? {...x, name: renameText.trim()} : x));
      }
    } catch(e) { console.error('Rename failed:', e); }
    setRenamingId(null);
  }, [renamingId, renameText, activeLibId, renameStore]);

  const savePattern = useCallback(async () => {
    const name = prompt('Pattern name:', `Pattern ${patterns.length + 1}`);
    if (!name || !name.trim()) return;
    try {
      const data = {
        grid: grid.map(row => [...row]),
        reverse: [...reverse],
        bpm, swing, chaos, numSteps, numSlices,
      };
      const id = await dbAddPattern(name.trim(), data);
      setPatterns(prev => [...prev, { id, name: name.trim(), ...data }]);
    } catch(e) { console.error('Save pattern failed:', e); }
  }, [grid, reverse, bpm, swing, chaos, numSteps, numSlices, patterns.length]);

  const loadPattern = useCallback((pattern) => {
    if (pattern.numSteps && pattern.numSteps !== numSteps) {
      setNumSteps(pattern.numSteps);
    }
    if (pattern.numSlices && pattern.numSlices !== numSlices) {
      setNumSlices(pattern.numSlices);
    }
    setGrid(pattern.grid.map(row => [...row]));
    setReverse([...pattern.reverse]);
    if (pattern.bpm != null) setBpm(pattern.bpm);
    if (pattern.swing != null) setSwing(pattern.swing);
    if (pattern.chaos != null) setChaos(pattern.chaos);
  }, [numSteps, numSlices]);

  // ─── Mic recording ───
  const startRecording = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream);
      recChunksRef.current=[]; mediaRecRef.current=mr; setRecSeconds(0);
      mr.ondataavailable=e=>{if(e.data.size>0)recChunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(recChunksRef.current,{type:'audio/webm'});
        const ab=await blob.arrayBuffer();
        const decoded=await decodeArrayBuffer(ab);
        loadRawBuffer(decoded,`Recording (${decoded.duration.toFixed(1)}s)`);
        if(recTimerRef.current)clearInterval(recTimerRef.current);
      };
      mr.start(); setIsRecording(true);
      recTimerRef.current=setInterval(()=>setRecSeconds(s=>s+1),1000);
    } catch(e){console.error('Mic denied:',e);}
  },[]);

  const stopRecording = useCallback(()=>{
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive')mediaRecRef.current.stop();
    setIsRecording(false);
    if(recTimerRef.current)clearInterval(recTimerRef.current);
  },[]);

  // ─── Output capture ───
  const startCapture = useCallback(()=>{
    if(!captureDestRef.current)getAudioContext();
    const mr=new MediaRecorder(captureDestRef.current.stream);
    captureChunksRef.current=[]; captureRecRef.current=mr; setCaptureSeconds(0);
    mr.ondataavailable=e=>{if(e.data.size>0)captureChunksRef.current.push(e.data);};
    mr.onstop=async()=>{
      const blob=new Blob(captureChunksRef.current,{type:'audio/webm'});
      try{
        const decoded=await decodeArrayBuffer(await blob.arrayBuffer());
        const wavBlob=encodeWAV(decoded);
        const url=URL.createObjectURL(wavBlob);
        const a=document.createElement('a');a.href=url;a.download=`brk-rmx-${Date.now()}.wav`;
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      }catch(e){console.error('Export failed:',e);}
      if(captureTimerRef.current)clearInterval(captureTimerRef.current);
    };
    mr.start(); setIsCapturing(true);
    captureTimerRef.current=setInterval(()=>setCaptureSeconds(s=>s+1),1000);
  },[]);

  const stopCapture = useCallback(()=>{
    if(captureRecRef.current&&captureRecRef.current.state!=='inactive')captureRecRef.current.stop();
    setIsCapturing(false);
    if(captureTimerRef.current)clearInterval(captureTimerRef.current);
  },[]);

  // ─── Preview ───
  const togglePreview = useCallback(()=>{
    if(isPreviewing){try{previewSourceRef.current.stop();}catch(e){}setIsPreviewing(false);return;}
    if(!audioBuffer)return;
    const ctx=getAudioContext(),src=ctx.createBufferSource();
    src.buffer=audioBuffer;src.connect(gainRef.current);src.onended=()=>setIsPreviewing(false);
    src.start();previewSourceRef.current=src;setIsPreviewing(true);
  },[isPreviewing,audioBuffer]);

  const handleSlicesChange = useCallback(v=>{setNumSlices(v);setGrid(initGrid(v,numSteps));},[numSteps]);

  const toggleSteps = useCallback(()=>{
    const newSteps = numSteps === 16 ? 32 : 16;
    setNumSteps(newSteps);
    setGrid(initGrid(numSlices, newSteps));
    setReverse(Array(newSteps).fill(false));
  },[numSteps, numSlices]);

  const setCellProb = useCallback((step,slice)=>{
    setGrid(prev=>{
      const next=prev.map(r=>[...r]),row=next[step];
      let nv=row[slice]===0?0.25:row[slice]>=0.95?0:Math.min(1,row[slice]+0.15);
      row[slice]=nv;
      const t=row.reduce((a,b)=>a+b,0);
      if(t>0)for(let i=0;i<row.length;i++)row[i]=row[i]/t;
      next[step]=row; return next;
    });
  },[]);

  const toggleReverse = useCallback(step=>{
    setReverse(prev=>{const n=[...prev];n[step]=!n[step];return n;});
  },[]);

  function pickSlice(sp){
    const cv=chaosRef.current;
    const m=sp.map(p=>Math.max(0,p+(Math.random()-0.5)*2*cv));
    const t=m.reduce((a,b)=>a+b,0);
    if(t===0)return Math.floor(Math.random()*m.length);
    let r=Math.random()*t;
    for(let i=0;i<m.length;i++){r-=m[i];if(r<=0)return i;}
    return m.length-1;
  }

  function playSlice(ctx,buffer,si,ns,when,dur,rev){
    const sl=buffer.length/ns,st=Math.floor(si*sl),en=Math.floor(st+sl);
    const sb=ctx.createBuffer(buffer.numberOfChannels,en-st,buffer.sampleRate);
    for(let ch=0;ch<buffer.numberOfChannels;ch++){
      const s=buffer.getChannelData(ch),d=sb.getChannelData(ch);
      for(let i=0;i<d.length;i++)d[i]=rev?s[en-1-i]:s[st+i];
    }
    const src=ctx.createBufferSource();src.buffer=sb;src.connect(gainRef.current);src.start(when,0,dur);
  }

  const startPlayback = useCallback(()=>{
    if(!audioBuffer)return;
    const ctx=getAudioContext();setIsPlaying(true);stepRef.current=0;
    let nst=ctx.currentTime+0.05;
    function sched(){
      const sd=(60/bpmRef.current)/4;
      while(nst<ctx.currentTime+0.1){
        const s=stepRef.current,sw=s%2===1?sd*swingRef.current*0.33:0;
        const pr=gridRef.current[s],ch=pickSlice(pr),rv=reverseRef.current[s];
        playSlice(ctx,audioBuffer,ch,gridRef.current[0].length,nst+sw,sd+sw,rv);
        setCurrentStep(s);setLastPickedSlice(ch);
        stepRef.current=(s+1)%numStepsRef.current;nst+=sd;
      }
      schedulerRef.current=setTimeout(sched,25);
    }
    sched();
  },[audioBuffer]);

  const stopPlayback = useCallback(()=>{
    setIsPlaying(false);setCurrentStep(-1);
    if(schedulerRef.current)clearTimeout(schedulerRef.current);
  },[]);

  const randomize = useCallback(()=>{
    setGrid(prev=>prev.map(row=>normalizeRow(row.map(()=>Math.random()<0.4?0:Math.random()))));
  },[]);
  const resetGrid = useCallback(()=>{setGrid(initGrid(numSlices,numSteps));setReverse(Array(numSteps).fill(false));},[numSlices,numSteps]);
  const fillDiagonal = useCallback(()=>{
    const g=Array.from({length:numSteps},()=>new Array(numSlices).fill(0));
    for(let s=0;s<numSteps;s++)g[s][s%numSlices]=1;setGrid(g);
  },[numSlices,numSteps]);

  // ─── Crop drag ───
  const handleWaveformPointerDown = useCallback(e=>{
    if(!waveformContainerRef.current||!rawBuffer)return;
    const rect=waveformContainerRef.current.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;
    const ds=Math.abs(x-cropStart),de=Math.abs(x-cropEnd);
    if(ds<de&&ds<0.06)setDragging('start');
    else if(de<0.06)setDragging('end');
    e.preventDefault();
  },[cropStart,cropEnd,rawBuffer]);

  const handleWaveformPointerMove = useCallback(e=>{
    if(!dragging||!waveformContainerRef.current)return;
    const rect=waveformContainerRef.current.getBoundingClientRect();
    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    if(dragging==='start')setCropStart(Math.min(x,cropEnd-0.02));
    else setCropEnd(Math.max(x,cropStart+0.02));
  },[dragging,cropStart,cropEnd]);

  const handleWaveformPointerUp = useCallback(()=>setDragging(null),[]);

  useEffect(()=>{
    if(dragging){
      window.addEventListener('pointermove',handleWaveformPointerMove);
      window.addEventListener('pointerup',handleWaveformPointerUp);
      return()=>{window.removeEventListener('pointermove',handleWaveformPointerMove);window.removeEventListener('pointerup',handleWaveformPointerUp);};
    }
  },[dragging,handleWaveformPointerMove,handleWaveformPointerUp]);

  // ─── Render ───
  const btn = (label,onClick,style={})=>(
    <button onClick={onClick} style={{padding:'10px 16px',background:C.surface,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,fontSize:11,fontWeight:500,cursor:'pointer',letterSpacing:1,...style}}>{label}</button>
  );

  return (
    <div style={{padding:20,maxWidth:1000,margin:'0 auto'}}>

      {/* Header */}
      <div style={{marginBottom:24,display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
        <h1 style={{fontSize:22,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:C.accent,margin:0,letterSpacing:'-0.5px'}}>BRK//RMX</h1>
        <span style={{color:C.textDim,fontSize:11,letterSpacing:1}}>PROBABILITY BREAK REMIXER</span>
        <button onClick={()=>{setShowLibrary(!showLibrary);if(!showLibrary)setShowPatterns(false);}} style={{
          marginLeft:'auto',padding:'6px 14px',background:showLibrary?C.accent:C.surface,
          color:showLibrary?'#000':C.text,border:`1px solid ${showLibrary?C.accent:C.border}`,
          borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:1,
        }}>
          LIBRARY ({library.length})
        </button>
        <button onClick={()=>{setShowPatterns(!showPatterns);if(!showPatterns)setShowLibrary(false);}} style={{
          padding:'6px 14px',background:showPatterns?C.cyan:C.surface,
          color:showPatterns?'#000':C.text,border:`1px solid ${showPatterns?C.cyan:C.border}`,
          borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:1,
        }}>
          PATTERNS ({patterns.length})
        </button>
      </div>

      {/* Library Panel */}
      {showLibrary && (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:C.textDim,letterSpacing:1}}>YOUR BREAKS</span>
            <label style={{marginLeft:'auto',padding:'6px 14px',background:C.accent,color:'#fff',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:500}}>
              + ADD FILES
              <input type="file" accept="audio/*" multiple onChange={handleFile} style={{display:'none'}} />
            </label>
          </div>

          {/* Shared library section (read-only) */}
          {sharedLibrary.length > 0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:9,color:C.cyan,letterSpacing:1,marginBottom:6,opacity:0.8}}>
                ★ SHARED BREAKS ({sharedLibrary.length})
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:200,overflowY:'auto'}}>
                {sharedLibrary.map(item => (
                  <div key={item.file} style={{
                    display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                    background:activeSharedId===item.file?`${C.cyan}15`:'transparent',
                    border:`1px solid ${activeSharedId===item.file?C.cyan+'66':C.border}`,
                    borderRadius:6,cursor:'pointer',
                  }} onClick={()=>selectFromShared(item)}>
                    <span style={{fontSize:9,color:C.cyan,opacity:0.7}}>★</span>
                    <span style={{flex:1,fontSize:11,color:activeSharedId===item.file?C.cyan:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {item.name}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* User library section */}
          {sharedLibrary.length > 0 && (
            <div style={{fontSize:9,color:C.textDim,letterSpacing:1,marginBottom:6}}>
              YOUR UPLOADS ({library.length})
            </div>
          )}
          {libLoading ? (
            <div style={{color:C.textDim,fontSize:11,padding:20,textAlign:'center'}}>Loading library...</div>
          ) : library.length === 0 ? (
            <div style={{color:C.textDim,fontSize:11,padding:20,textAlign:'center'}}>
              {sharedLibrary.length > 0 ? 'No personal uploads yet. Add your own WAV files above.' : 'No breaks saved yet. Add some WAV files to build your library.'}
              <br/>They'll persist between sessions.
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:240,overflowY:'auto'}}>
              {library.map(item => (
                <div key={item.id} style={{
                  display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                  background:activeLibId===item.id?`${C.accent}15`:'transparent',
                  border:`1px solid ${activeLibId===item.id?C.accent+'44':C.border}`,
                  borderRadius:6,cursor:'pointer',
                }} onClick={()=>selectFromLibrary(item)}>
                  {renamingId===item.id ? (
                    <input
                      value={renameText}
                      onChange={e=>setRenameText(e.target.value)}
                      onBlur={confirmRename}
                      onKeyDown={e=>{if(e.key==='Enter')confirmRename();if(e.key==='Escape')setRenamingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      autoFocus
                      style={{flex:1,background:C.bg,color:C.text,border:`1px solid ${C.accent}`,borderRadius:4,padding:'4px 8px',fontSize:11,fontFamily:'inherit',outline:'none'}}
                    />
                  ) : (
                    <span style={{flex:1,fontSize:11,color:activeLibId===item.id?C.accent:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {item.name}
                    </span>
                  )}
                  <button onClick={e=>{e.stopPropagation();startRename(item, STORE_NAME);}} style={{background:'none',border:'none',color:C.textDim,cursor:'pointer',fontSize:10,padding:'2px 6px'}}>✎</button>
                  <button onClick={e=>{e.stopPropagation();if(confirm(`Delete "${item.name}"?`))deleteFromLibrary(item.id);}} style={{background:'none',border:'none',color:'#ff5252',cursor:'pointer',fontSize:10,padding:'2px 6px'}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Patterns Panel */}
      {showPatterns && (
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:C.textDim,letterSpacing:1}}>YOUR PATTERNS</span>
            <button onClick={savePattern} style={{
              marginLeft:'auto',padding:'6px 14px',background:C.cyan,color:'#000',
              border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:600,
            }}>
              + SAVE CURRENT
            </button>
          </div>
          {patterns.length === 0 ? (
            <div style={{color:C.textDim,fontSize:11,padding:20,textAlign:'center'}}>
              No patterns saved yet. Build a probability matrix and tap SAVE CURRENT.
              <br/>Patterns store your grid, BPM, swing, chaos, and step count.
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:240,overflowY:'auto'}}>
              {patterns.map(item => (
                <div key={item.id} style={{
                  display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
                  background:'transparent',
                  border:`1px solid ${C.border}`,
                  borderRadius:6,cursor:'pointer',
                }} onClick={()=>loadPattern(item)}>
                  {renamingId===item.id && renameStore===PATTERN_STORE ? (
                    <input
                      value={renameText}
                      onChange={e=>setRenameText(e.target.value)}
                      onBlur={confirmRename}
                      onKeyDown={e=>{if(e.key==='Enter')confirmRename();if(e.key==='Escape')setRenamingId(null);}}
                      onClick={e=>e.stopPropagation()}
                      autoFocus
                      style={{flex:1,background:C.bg,color:C.text,border:`1px solid ${C.cyan}`,borderRadius:4,padding:'4px 8px',fontSize:11,fontFamily:'inherit',outline:'none'}}
                    />
                  ) : (
                    <>
                      <span style={{flex:1,fontSize:11,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {item.name}
                      </span>
                      <span style={{fontSize:9,color:C.textDim}}>
                        {item.numSteps}st • {item.numSlices}sl • {item.bpm}bpm
                      </span>
                    </>
                  )}
                  <button onClick={e=>{e.stopPropagation();startRename(item, PATTERN_STORE);}} style={{background:'none',border:'none',color:C.textDim,cursor:'pointer',fontSize:10,padding:'2px 6px'}}>✎</button>
                  <button onClick={e=>{e.stopPropagation();if(confirm(`Delete "${item.name}"?`))deletePattern(item.id);}} style={{background:'none',border:'none',color:'#ff5252',cursor:'pointer',fontSize:10,padding:'2px 6px'}}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Source controls */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:waveformData?12:0,flexWrap:'wrap'}}>
          <label style={{padding:'8px 16px',background:audioBuffer?C.border:C.accent,color:audioBuffer?C.text:'#fff',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:500}}>
            {audioBuffer?'ADD MORE':'LOAD BREAKS'}
            <input type="file" accept="audio/*" multiple onChange={handleFile} style={{display:'none'}} />
          </label>
          <span style={{color:C.textDim,fontSize:11}}>or</span>
          <button onClick={isRecording?stopRecording:startRecording} style={{
            padding:'8px 16px',background:isRecording?'#ff1744':C.surface,
            color:isRecording?'#fff':C.text,border:`1px solid ${isRecording?'#ff1744':C.border}`,
            borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:500,
            animation:isRecording?'recPulse 1s ease-in-out infinite':'none',
          }}>
            {isRecording?`■ STOP REC (${recSeconds}s)`:'● REC'}
          </button>
          {audioBuffer && (
            <button onClick={togglePreview} style={{
              padding:'8px 14px',background:isPreviewing?C.warm:C.surface,
              color:isPreviewing?'#000':C.text,border:`1px solid ${isPreviewing?C.warm:C.border}`,
              borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:500,
            }}>
              {isPreviewing?'■ STOP':'▶ PREVIEW'}
            </button>
          )}
          {(activeLibId != null || activeSharedId != null) && audioBuffer && (
            <button onClick={saveBreakState} style={{
              padding:'8px 14px',background:savedFlash?C.green:C.surface,
              color:savedFlash?'#000':C.text,border:`1px solid ${savedFlash?C.green:C.border}`,
              borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:500,transition:'all 0.2s',
            }}>
              {savedFlash ? '✓ SAVED' : 'SAVE STATE'}
            </button>
          )}
          {fileName && <span style={{color:C.textDim,fontSize:12}}>{fileName}</span>}
          {audioBuffer && <span style={{color:C.textDim,fontSize:11,marginLeft:'auto'}}>{audioBuffer.duration.toFixed(2)}s • {audioBuffer.sampleRate}Hz</span>}
        </div>

        {waveformData && (
          <div ref={waveformContainerRef} onPointerDown={handleWaveformPointerDown}
            style={{position:'relative',height:90,cursor:dragging?'ew-resize':'default',touchAction:'none'}}>
            <svg width="100%" height="90" viewBox="0 0 600 90" preserveAspectRatio="none" style={{display:'block'}}>
              {/* Dimmed crop-out regions */}
              <rect x={0} y={0} width={cropStart*600} height={90} fill="rgba(0,0,0,0.65)"/>
              <rect x={cropEnd*600} y={0} width={(1-cropEnd)*600} height={90} fill="rgba(0,0,0,0.65)"/>
              {/* Waveform bars */}
              {waveformData.map((v,i)=>{
                const frac=i/waveformData.length;
                const inC=frac>=cropStart&&frac<=cropEnd;
                const x=frac*600;
                return <rect key={i} x={x} y={45-v*40} width={600/waveformData.length} height={Math.max(0.5,v*80)} fill={inC?C.accent:C.textDim} opacity={inC?0.75:0.18}/>;
              })}
              {/* Slice markers */}
              {Array.from({length:numSlices+1}).map((_,i)=>{
                const f=cropStart+(i/numSlices)*(cropEnd-cropStart);
                return <line key={i} x1={f*600} y1={0} x2={f*600} y2={90} stroke={C.warm} strokeWidth={0.6} opacity={0.45}/>;
              })}
              {/* Crop handles - thin lines, translucent */}
              <line x1={cropStart*600} y1={0} x2={cropStart*600} y2={90} stroke={C.cyan} strokeWidth={0.8} opacity={0.85}/>
              <line x1={cropEnd*600} y1={0} x2={cropEnd*600} y2={90} stroke={C.cyan} strokeWidth={0.8} opacity={0.85}/>
              {/* Tiny grip indicators at top/bottom */}
              <circle cx={cropStart*600} cy={4} r={2} fill={C.cyan} opacity={0.9}/>
              <circle cx={cropStart*600} cy={86} r={2} fill={C.cyan} opacity={0.9}/>
              <circle cx={cropEnd*600} cy={4} r={2} fill={C.cyan} opacity={0.9}/>
              <circle cx={cropEnd*600} cy={86} r={2} fill={C.cyan} opacity={0.9}/>
              {/* Wider invisible hit areas for easier dragging */}
              <rect x={cropStart*600-8} y={0} width={16} height={90} fill="transparent" style={{cursor:'ew-resize'}}/>
              <rect x={cropEnd*600-8} y={0} width={16} height={90} fill="transparent" style={{cursor:'ew-resize'}}/>
            </svg>
            {(cropStart>0||cropEnd<1)&&rawBuffer&&(
              <div style={{position:'absolute',bottom:2,right:4,fontSize:9,color:C.cyan,opacity:0.8}}>
                CROP: {(cropStart*rawBuffer.duration).toFixed(2)}s — {(cropEnd*rawBuffer.duration).toFixed(2)}s
              </div>
            )}
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:16}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:C.textDim,letterSpacing:1}}>BPM</span>
            <span style={{fontSize:13,color:C.accent,fontWeight:700}}>{bpm}</span>
          </div>
          <input type="range" min={60} max={200} step={1} value={bpm} onChange={e=>setBpm(+e.target.value)} />
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:C.textDim,letterSpacing:1}}>SLICES</span>
            <span style={{fontSize:13,color:C.accent,fontWeight:700}}>{numSlices}</span>
          </div>
          <input type="range" min={4} max={32} step={1} value={numSlices} onChange={e=>handleSlicesChange(+e.target.value)} />
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:C.textDim,letterSpacing:1}}>SWING</span>
            <span style={{fontSize:13,color:C.accent,fontWeight:700}}>{Math.round(swing*100)}%</span>
          </div>
          <input type="range" min={0} max={1} step={0.01} value={swing} onChange={e=>setSwing(+e.target.value)} />
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:C.textDim,letterSpacing:1}}>CHAOS</span>
            <span style={{fontSize:13,color:C.accent,fontWeight:700}}>{Math.round(chaos*100)}%</span>
          </div>
          <input type="range" min={0} max={1} step={0.01} value={chaos} onChange={e=>setChaos(+e.target.value)} />
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:C.textDim,letterSpacing:1}}>VOL</span>
            <span style={{fontSize:13,color:C.accent,fontWeight:700}}>{Math.round(volume*100)}%</span>
          </div>
          <input type="range" min={0} max={1} step={0.01} value={volume} onChange={e=>setVolume(+e.target.value)} />
        </div>
      </div>

      {/* Transport */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <button onClick={isPlaying?stopPlayback:startPlayback} disabled={!audioBuffer} style={{
          padding:'10px 28px',background:isPlaying?C.accent:C.green,color:'#000',border:'none',
          borderRadius:6,fontSize:13,fontWeight:700,cursor:audioBuffer?'pointer':'not-allowed',
          opacity:audioBuffer?1:0.3,letterSpacing:1,
          boxShadow:isPlaying?`0 0 20px ${C.accentGlow}`:`0 0 20px ${C.greenDim}`,
        }}>
          {isPlaying?'■ STOP':'▶ PLAY'}
        </button>
        {btn('RANDOM',randomize)}
        {btn('DIAGONAL',fillDiagonal)}
        {btn(`${numSteps} STEPS`, toggleSteps, {background:numSteps===32?C.warm:C.surface, color:numSteps===32?'#000':C.text, borderColor:numSteps===32?C.warm:C.border})}
        {btn('RESET',resetGrid)}
        <button onClick={isCapturing?stopCapture:startCapture} disabled={!isPlaying&&!isCapturing} style={{
          padding:'10px 16px',background:isCapturing?'#ff1744':C.surface,
          color:isCapturing?'#fff':C.text,border:`1px solid ${isCapturing?'#ff1744':C.border}`,
          borderRadius:6,fontSize:11,fontWeight:500,cursor:(isPlaying||isCapturing)?'pointer':'not-allowed',
          opacity:(isPlaying||isCapturing)?1:0.35,letterSpacing:1,marginLeft:'auto',
          animation:isCapturing?'recPulse 1s ease-in-out infinite':'none',
        }}>
          {isCapturing?`■ SAVE (${captureSeconds}s)`:'⏺ EXPORT'}
        </button>
      </div>

      {/* Info */}
      {isPlaying&&(
        <div style={{display:'flex',gap:16,marginBottom:12,fontSize:11,color:C.textDim}}>
          <span>STEP <span style={{color:C.accent}}>{currentStep+1}</span>/{numSteps}</span>
          <span>SLICE <span style={{color:C.warm}}>{lastPickedSlice+1}</span>/{numSlices}</span>
        </div>
      )}

      {/* Grid */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:12,overflowX:'auto'}}>
        <div style={{fontSize:10,color:C.textDim,marginBottom:8,letterSpacing:1}}>
          PROBABILITY MATRIX — ROWS = SLICES • COLUMNS = STEPS • COLUMNS AUTO-NORMALIZE TO 100%
        </div>
        {/* Step number header row */}
        <div style={{display:'flex',gap:2,marginBottom:4,paddingLeft:38}}>
          {Array.from({length:numSteps}).map((_,step)=>(
            <div key={step} style={{
              width:numSteps>16?18:24,minWidth:numSteps>16?18:24,textAlign:'center',fontSize:9,
              color:currentStep===step?C.accent:C.textDim,
              fontWeight:currentStep===step?700:400,
              marginLeft:numSteps>16&&step===16?8:0,
            }}>{step+1}</div>
          ))}
        </div>
        {/* Slice rows */}
        {Array.from({length:numSlices}).map((_,slice)=>(
          <div key={slice} style={{display:'flex',gap:2,alignItems:'center',marginBottom:2}}>
            <div style={{width:34,minWidth:34,textAlign:'right',paddingRight:6,fontSize:10,color:C.warm,fontWeight:500}}>
              S{slice+1}
            </div>
            {grid.map((row,step)=>{
              const prob=row[slice];
              const isActiveCell=currentStep===step&&lastPickedSlice===slice;
              return (
                <div key={step} onClick={()=>setCellProb(step,slice)} style={{
                  width:numSteps>16?18:24,minWidth:numSteps>16?18:24,height:24,background:heatColor(prob),
                  border:`1px solid ${isActiveCell?C.accent:prob>0?C.accent+'33':C.border}`,
                  borderRadius:3,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:8,color:prob>0.5?'#fff':C.textDim,fontWeight:prob>0.8?700:400,userSelect:'none',
                  boxShadow:currentStep===step?`inset 0 0 0 1px ${C.accent}22`:'none',
                  marginLeft:numSteps>16&&step===16?8:0,
                }}>
                  {prob>0.005?Math.round(prob*100):''}
                </div>
              );
            })}
          </div>
        ))}
        {/* REV row at bottom */}
        <div style={{display:'flex',gap:2,alignItems:'center',marginTop:6,paddingTop:6,borderTop:`1px solid ${C.border}`}}>
          <div style={{width:34,minWidth:34,textAlign:'right',paddingRight:6,fontSize:10,color:C.textDim}}>
            REV
          </div>
          {Array.from({length:numSteps}).map((_,step)=>(
            <div key={step} onClick={()=>toggleReverse(step)} style={{
              width:numSteps>16?18:24,minWidth:numSteps>16?18:24,height:24,background:reverse[step]?C.accentDim:'transparent',
              border:`1px solid ${reverse[step]?C.accent+'66':C.border}`,borderRadius:3,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,
              color:reverse[step]?C.accent:C.textDim,userSelect:'none',
              marginLeft:numSteps>16&&step===16?8:0,
            }}>
              {reverse[step]?'◄':''}
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:16,fontSize:10,color:C.textDim,lineHeight:1.6,maxWidth:600}}>
        Your loop library is saved in this browser and persists between sessions.
        Add breaks via LIBRARY or LOAD BREAKS. Drag cyan handles to crop.
        Each probability row sums to 100%. EXPORT captures output as .wav.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
