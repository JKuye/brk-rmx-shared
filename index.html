<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRK//RMX</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d;
  color: #888;

select option { background: #1a1a1a; color: #888; }

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const DB_NAME = 'brk-rmx-library';
const DB_VERSION = 2;
const STORE_NAME = 'loops';
const PATTERN_STORE = 'patterns';
const DEFAULT_STEPS = 16;
const DEFAULT_SLICES = 16;

const C = {
  bg:        '#0d0d0d',
  chassis:   '#1b1b1b',
  panel:     '#1e1e1e',
  panelDark: '#151515',
  border:    '#282828',
  borderHi:  '#3c3c3c',
  borderSh:  '#0a0a0a',
  lcdBg:     '#030a03',
  lcd:       '#3dff7a',
  lcdMid:    '#178535',
  lcdDim:    '#091409',
  ledRed:    '#ff2200',
  ledAmber:  '#ffaa00',
  ledGreen:  '#00ff44',
  text:      '#777',
  textBright:'#aaa',
  textDim:   '#3a3a3a',
  accent:    '#ffaa00',
  accentDim: '#ffaa0033',
  warm:      '#ff6600',
  cyan:      '#00bbee',
  cyanDim:   '#00bbee33',
  green:     '#00ff44',
  greenDim:  '#00ff4422',
};

// ─── IndexedDB helpers ───
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME))
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains(PATTERN_STORE))
        db.createObjectStore(PATTERN_STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll(storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbAdd(name, arrayBuffer) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).add({
      name, audioData: arrayBuffer, addedAt: Date.now(),
      cropStart: 0, cropEnd: 1, numSlices: DEFAULT_SLICES, numSteps: DEFAULT_STEPS,
    });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(id, storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function dbRename(id, newName, storeName = STORE_NAME) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (!record) return reject(new Error('Not found'));
      record.name = newName;
      const putReq = store.put(record);
      putReq.onsuccess = () => resolve();
      putReq.onerror = () => reject(putReq.error);
    };
    getReq.onerror = () => reject(getReq.error);
  });
}

function getSharedSettings(file) {
  try { const s = localStorage.getItem('brk-rmx-shared:' + file); return s ? JSON.parse(s) : null; }
  catch(e) { return null; }
}

function saveSharedSettings(file, settings) {
  try { localStorage.setItem('brk-rmx-shared:' + file, JSON.stringify(settings)); }
  catch(e) { console.error('Failed to save shared settings:', e); }
}

async function dbUpdateBreakSettings(id, settings) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const record = getReq.result;
      if (!record) return reject(new Error('Not found'));
      Object.assign(record, settings);
      const putReq = store.put(record);
      putReq.onsuccess = () => resolve();
      putReq.onerror = () => reject(putReq.error);
    };
    getReq.onerror = () => reject(getReq.error);
  });
}

async function dbAddPattern(name, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PATTERN_STORE, 'readwrite');
    const req = tx.objectStore(PATTERN_STORE).add({ name, ...data, addedAt: Date.now() });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function encodeWAV(buf) {
  const nCh = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length;
  const bps = 2, ba = nCh * bps, ds = len * ba;
  const ab = new ArrayBuffer(44 + ds), v = new DataView(ab);
  const ws = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+ds,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,nCh,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*ba,true); v.setUint16(32,ba,true);
  v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40,ds,true);
  const chs=[]; for(let c=0;c<nCh;c++) chs.push(buf.getChannelData(c));
  let o=44;
  for(let i=0;i<len;i++) for(let c=0;c<nCh;c++) {
    const s=Math.max(-1,Math.min(1,chs[c][i]));
    v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}

function heatColor(p) {
  if(p===0) return 'transparent';
  const r=Math.round(255*Math.min(1,p*1.8));
  const g=Math.round(110*p*(1-p*0.4));
  return `rgba(${r},${g},0,${0.18+p*0.72})`;
}

function normalizeRow(row) {
  const t=row.reduce((a,b)=>a+b,0);
  return t===0?row:row.map(v=>v/t);
}

function App() {
  const [rawBuffer, setRawBuffer] = useState(null);
  const [audioBuffer, setAudioBuffer] = useState(null);
  const [fileName, setFileName] = useState('');
  const [numSlices, setNumSlices] = useState(DEFAULT_SLICES);
  const [numSteps, setNumSteps] = useState(DEFAULT_STEPS);
  const [bpm, setBpm] = useState(80);
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentStep, setCurrentStep] = useState(-1);
  const [grid, setGrid] = useState(() => initGrid(DEFAULT_SLICES, DEFAULT_STEPS));
  const [swing, setSwing] = useState(0);
  const [chaos, setChaos] = useState(0);
  const [waveformData, setWaveformData] = useState(null);
  const [lastPickedSlice, setLastPickedSlice] = useState(-1);
  const [reverse, setReverse] = useState(() => Array(DEFAULT_STEPS).fill(false));
  const [volume, setVolume] = useState(0.85);
  const [isRecording, setIsRecording] = useState(false);
  const [recSeconds, setRecSeconds] = useState(0);
  const [isCapturing, setIsCapturing] = useState(false);
  const [captureSeconds, setCaptureSeconds] = useState(0);
  const [isPreviewing, setIsPreviewing] = useState(false);
  const [cropStart, setCropStart] = useState(0);
  const [cropEnd, setCropEnd] = useState(1);
  const [dragging, setDragging] = useState(null);
  const [library, setLibrary] = useState([]);
  const [sharedLibrary, setSharedLibrary] = useState([]);
  const [activeLibId, setActiveLibId] = useState(null);
  const [activeSharedId, setActiveSharedId] = useState(null);
  const [libLoading, setLibLoading] = useState(true);
  const [showLibrary, setShowLibrary] = useState(false);
  const [renamingId, setRenamingId] = useState(null);
  const [renameText, setRenameText] = useState('');
  const [renameStore, setRenameStore] = useState(STORE_NAME);
  const [patterns, setPatterns] = useState([]);
  const [showPatterns, setShowPatterns] = useState(false);

  const mediaRecRef = useRef(null);
  const recChunksRef = useRef([]);
  const recTimerRef = useRef(null);
  const captureRecRef = useRef(null);
  const captureChunksRef = useRef([]);
  const captureTimerRef = useRef(null);
  const captureDestRef = useRef(null);
  const ctxRef = useRef(null);
  const gainRef = useRef(null);
  const schedulerRef = useRef(null);
  const stepRef = useRef(0);
  const gridRef = useRef(grid);
  const swingRef = useRef(swing);
  const chaosRef = useRef(chaos);
  const reverseRef = useRef(reverse);
  const bpmRef = useRef(bpm);
  const volumeRef = useRef(volume);
  const numStepsRef = useRef(numSteps);
  const previewSourceRef = useRef(null);
  const waveformContainerRef = useRef(null);
  const audioBufferRef = useRef(null);
  const isPlayingRef = useRef(false);
  const activeLibIdRef = useRef(null);
  const activeSharedIdRef = useRef(null);
  const cropStartRef = useRef(0);
  const cropEndRef = useRef(1);
  const numSlicesRef = useRef(DEFAULT_SLICES);
  const copiedConfigRef = useRef(null);

  useEffect(()=>{gridRef.current=grid},[grid]);
  useEffect(()=>{swingRef.current=swing},[swing]);
  useEffect(()=>{chaosRef.current=chaos},[chaos]);
  useEffect(()=>{reverseRef.current=reverse},[reverse]);
  useEffect(()=>{bpmRef.current=bpm},[bpm]);
  useEffect(()=>{numStepsRef.current=numSteps},[numSteps]);
  useEffect(()=>{
    volumeRef.current=volume;
    if(gainRef.current) gainRef.current.gain.value=volume;
  },[volume]);
  useEffect(()=>{audioBufferRef.current=audioBuffer;if(isPlayingRef.current&&audioBuffer)stepRef.current=0;},[audioBuffer]);
  useEffect(()=>{isPlayingRef.current=isPlaying;},[isPlaying]);
  useEffect(()=>{activeLibIdRef.current=activeLibId;},[activeLibId]);
  useEffect(()=>{activeSharedIdRef.current=activeSharedId;},[activeSharedId]);
  useEffect(()=>{cropStartRef.current=cropStart;},[cropStart]);
  useEffect(()=>{cropEndRef.current=cropEnd;},[cropEnd]);
  useEffect(()=>{numSlicesRef.current=numSlices;},[numSlices]);
  useEffect(()=>{copiedConfigRef.current=copiedConfig;},[copiedConfig]);

  const saveCurrentBreak = useCallback(()=>{
    const alid=activeLibIdRef.current,asid=activeSharedIdRef.current;
    const cs=cropStartRef.current,ce=cropEndRef.current;
    const ns=numSlicesRef.current,nst=numStepsRef.current;
    if(alid!=null) dbUpdateBreakSettings(alid,{cropStart:cs,cropEnd:ce,numSlices:ns,numSteps:nst});
    else if(asid!=null) saveSharedSettings(asid,{cropStart:cs,cropEnd:ce,numSlices:ns,numSteps:nst});
  },[]);

  useEffect(() => {
    (async () => {
      try {
        const items = await dbGetAll();
        setLibrary(items);
        const pats = await dbGetAll(PATTERN_STORE);
        setPatterns(pats);
      } catch(e) { console.error('Failed to load:', e); }
      setLibLoading(false);
    })();
    (async () => {
      try {
        const res = await fetch('library.json');
        if (!res.ok) throw new Error('No library.json');
        const list = await res.json();
        setSharedLibrary(list);
      } catch(e) { console.warn('No shared library found:', e.message); }
    })();
  }, []);

  const selectFromShared = useCallback(async (item) => {
    try {
      saveCurrentBreak();
      const res = await fetch(item.file);
      if (!res.ok) throw new Error(`Failed to load ${item.file}`);
      const ab = await res.arrayBuffer();
      const decoded = await decodeArrayBuffer(ab);
      setActiveSharedId(item.file);
      setActiveLibId(null);
      const saved = getSharedSettings(item.file);
      const cc = copiedConfigRef.current;
      loadRawBuffer(decoded, item.name, cc || {
        cropStart: saved?.cropStart ?? item.cropStart,
        cropEnd: saved?.cropEnd ?? item.cropEnd,
        numSlices: saved?.numSlices ?? item.numSlices,
        numSteps: saved?.numSteps ?? item.numSteps,
      });
    } catch(e) { console.error('Failed to load shared break:', e); }
  }, [saveCurrentBreak]);

  function initGrid(slices, steps) {
    const g=[];
    for(let s=0;s<steps;s++){const r=new Array(slices).fill(0);r[s%slices]=1;g.push(r);}
    return g;
  }

  function getAudioContext() {
    if(!ctxRef.current){
      ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      gainRef.current=ctxRef.current.createGain();
      gainRef.current.gain.value=volumeRef.current;
      gainRef.current.connect(ctxRef.current.destination);
      captureDestRef.current=ctxRef.current.createMediaStreamDestination();
      gainRef.current.connect(captureDestRef.current);
    }
    if(ctxRef.current.state==='suspended') ctxRef.current.resume();
    return ctxRef.current;
  }

  function generateWaveform(decoded) {
    const raw=decoded.getChannelData(0), pts=600, bs=Math.floor(raw.length/pts), wf=[];
    for(let i=0;i<pts;i++){let s=0;for(let j=0;j<bs;j++)s+=Math.abs(raw[i*bs+j]);wf.push(s/bs);}
    const mx=Math.max(...wf,0.001);
    return wf.map(v=>v/mx);
  }

  function cropBuffer(buffer, s, e) {
    const ctx=getAudioContext();
    const ss=Math.floor(s*buffer.length), se=Math.floor(e*buffer.length), len=Math.max(1,se-ss);
    const cr=ctx.createBuffer(buffer.numberOfChannels,len,buffer.sampleRate);
    for(let ch=0;ch<buffer.numberOfChannels;ch++){
      const src=buffer.getChannelData(ch),dst=cr.getChannelData(ch);
      for(let i=0;i<len;i++) dst[i]=src[ss+i];
    }
    return cr;
  }

  function loadRawBuffer(decoded, name, settings = null) {
    setRawBuffer(decoded); setFileName(name);
    if (settings) {
      setCropStart(settings.cropStart ?? 0);
      setCropEnd(settings.cropEnd ?? 1);
      const ns = settings.numSlices ?? numSlices;
      const nst = settings.numSteps ?? numSteps;
      if (ns !== numSlices || nst !== numSteps) {
        setNumSlices(ns); setNumSteps(nst);
        setGrid(initGrid(ns, nst)); setReverse(Array(nst).fill(false));
      }
    } else { setCropStart(0); setCropEnd(1); }
    setWaveformData(generateWaveform(decoded));
    setAudioBuffer(decoded);
  }

  async function decodeArrayBuffer(arrayBuffer) {
    const ctx = getAudioContext();
    const copy = arrayBuffer.slice(0);
    return ctx.decodeAudioData(copy);
  }

  useEffect(()=>{
    if(rawBuffer&&(cropStart>0||cropEnd<1)) setAudioBuffer(cropBuffer(rawBuffer,cropStart,cropEnd));
    else if(rawBuffer) setAudioBuffer(rawBuffer);
  },[cropStart,cropEnd,rawBuffer]);

  const [savedFlash, setSavedFlash] = useState(false);
  const [copiedConfig, setCopiedConfig] = useState(null);

  const saveBreakState = useCallback(() => {
    if (activeLibId != null) {
      dbUpdateBreakSettings(activeLibId, { cropStart, cropEnd, numSlices, numSteps })
        .then(() => {
          setLibrary(prev => prev.map(x => x.id === activeLibId ? { ...x, cropStart, cropEnd, numSlices, numSteps } : x));
          setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1200);
        }).catch(e => console.error('Settings save failed:', e));
    } else if (activeSharedId != null) {
      saveSharedSettings(activeSharedId, { cropStart, cropEnd, numSlices, numSteps });
      setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1200);
    }
  }, [activeLibId, activeSharedId, cropStart, cropEnd, numSlices, numSteps]);

  const handleFile = useCallback(async (e) => {
    const files = Array.from(e.target.files||[]);
    if(!files.length) return;
    getAudioContext();
    let firstDecoded = null, firstName = null;
    for(const file of files) {
      try {
        const ab = await file.arrayBuffer();
        const id = await dbAdd(file.name, ab);
        const decoded = await decodeArrayBuffer(ab);
        setLibrary(prev => [...prev, { id, name: file.name, audioData: ab }]);
        if(!firstDecoded) { firstDecoded = decoded; firstName = file.name; setActiveLibId(id); }
      } catch(err) { console.error(`Failed: ${file.name}`, err); }
    }
    if(firstDecoded) loadRawBuffer(firstDecoded, firstName);
    e.target.value = '';
  }, []);

  const selectFromLibrary = useCallback(async (item) => {
    try {
      saveCurrentBreak();
      const decoded = await decodeArrayBuffer(item.audioData);
      setActiveLibId(item.id); setActiveSharedId(null);
      const cc = copiedConfigRef.current;
      loadRawBuffer(decoded, item.name, cc || {
        cropStart: item.cropStart, cropEnd: item.cropEnd,
        numSlices: item.numSlices, numSteps: item.numSteps,
      });
    } catch(e) { console.error('Failed to decode:', e); }
  }, [saveCurrentBreak]);

  const deleteFromLibrary = useCallback(async (id) => {
    try {
      await dbDelete(id);
      setLibrary(prev => prev.filter(x => x.id !== id));
      if(activeLibId === id) {
        setRawBuffer(null); setAudioBuffer(null); setFileName('');
        setWaveformData(null); setActiveLibId(null);
      }
    } catch(e) { console.error('Delete failed:', e); }
  }, [activeLibId]);

  const deletePattern = useCallback(async (id) => {
    try {
      await dbDelete(id, PATTERN_STORE);
      setPatterns(prev => prev.filter(x => x.id !== id));
    } catch(e) { console.error('Delete pattern failed:', e); }
  }, []);

  const startRename = useCallback((item, store = STORE_NAME) => {
    setRenamingId(item.id); setRenameText(item.name); setRenameStore(store);
  }, []);

  const confirmRename = useCallback(async () => {
    if(!renamingId || !renameText.trim()) return;
    try {
      await dbRename(renamingId, renameText.trim(), renameStore);
      if (renameStore === STORE_NAME) {
        setLibrary(prev => prev.map(x => x.id === renamingId ? {...x, name: renameText.trim()} : x));
        if(activeLibId === renamingId) setFileName(renameText.trim());
      } else {
        setPatterns(prev => prev.map(x => x.id === renamingId ? {...x, name: renameText.trim()} : x));
      }
    } catch(e) { console.error('Rename failed:', e); }
    setRenamingId(null);
  }, [renamingId, renameText, activeLibId, renameStore]);

  const savePattern = useCallback(async () => {
    const name = prompt('Pattern name:', `Pattern ${patterns.length + 1}`);
    if (!name || !name.trim()) return;
    try {
      const data = { grid: grid.map(row => [...row]), reverse: [...reverse], bpm, swing, chaos, numSteps, numSlices };
      const id = await dbAddPattern(name.trim(), data);
      setPatterns(prev => [...prev, { id, name: name.trim(), ...data }]);
    } catch(e) { console.error('Save pattern failed:', e); }
  }, [grid, reverse, bpm, swing, chaos, numSteps, numSlices, patterns.length]);

  const loadPattern = useCallback((pattern) => {
    if (pattern.numSteps && pattern.numSteps !== numSteps) setNumSteps(pattern.numSteps);
    if (pattern.numSlices && pattern.numSlices !== numSlices) setNumSlices(pattern.numSlices);
    setGrid(pattern.grid.map(row => [...row]));
    setReverse([...pattern.reverse]);
    if (pattern.bpm != null) setBpm(pattern.bpm);
    if (pattern.swing != null) setSwing(pattern.swing);
    if (pattern.chaos != null) setChaos(pattern.chaos);
  }, [numSteps, numSlices]);

  const startRecording = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream);
      recChunksRef.current=[]; mediaRecRef.current=mr; setRecSeconds(0);
      mr.ondataavailable=e=>{if(e.data.size>0)recChunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(recChunksRef.current,{type:'audio/webm'});
        const ab=await blob.arrayBuffer();
        const decoded=await decodeArrayBuffer(ab);
        loadRawBuffer(decoded,`Recording (${decoded.duration.toFixed(1)}s)`);
        if(recTimerRef.current)clearInterval(recTimerRef.current);
      };
      mr.start(); setIsRecording(true);
      recTimerRef.current=setInterval(()=>setRecSeconds(s=>s+1),1000);
    } catch(e){console.error('Mic denied:',e);}
  },[]);

  const stopRecording = useCallback(()=>{
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive')mediaRecRef.current.stop();
    setIsRecording(false);
    if(recTimerRef.current)clearInterval(recTimerRef.current);
  },[]);

  const startCapture = useCallback(()=>{
    if(!captureDestRef.current)getAudioContext();
    const mr=new MediaRecorder(captureDestRef.current.stream);
    captureChunksRef.current=[]; captureRecRef.current=mr; setCaptureSeconds(0);
    mr.ondataavailable=e=>{if(e.data.size>0)captureChunksRef.current.push(e.data);};
    mr.onstop=async()=>{
      const blob=new Blob(captureChunksRef.current,{type:'audio/webm'});
      try{
        const decoded=await decodeArrayBuffer(await blob.arrayBuffer());
        const wavBlob=encodeWAV(decoded);
        const url=URL.createObjectURL(wavBlob);
        const a=document.createElement('a');a.href=url;a.download=`brk-rmx-${Date.now()}.wav`;
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      }catch(e){console.error('Export failed:',e);}
      if(captureTimerRef.current)clearInterval(captureTimerRef.current);
    };
    mr.start(); setIsCapturing(true);
    captureTimerRef.current=setInterval(()=>setCaptureSeconds(s=>s+1),1000);
  },[]);

  const stopCapture = useCallback(()=>{
    if(captureRecRef.current&&captureRecRef.current.state!=='inactive')captureRecRef.current.stop();
    setIsCapturing(false);
    if(captureTimerRef.current)clearInterval(captureTimerRef.current);
  },[]);

  const togglePreview = useCallback(()=>{
    if(isPreviewing){try{previewSourceRef.current.stop();}catch(e){}setIsPreviewing(false);return;}
    if(!audioBuffer)return;
    const ctx=getAudioContext(),src=ctx.createBufferSource();
    src.buffer=audioBuffer;src.connect(gainRef.current);src.onended=()=>setIsPreviewing(false);
    src.start();previewSourceRef.current=src;setIsPreviewing(true);
  },[isPreviewing,audioBuffer]);

  const handleSlicesChange = useCallback(v=>{setNumSlices(v);setGrid(initGrid(v,numSteps));},[numSteps]);

  const toggleSteps = useCallback(()=>{
    const newSteps = numSteps === 8 ? 16 : numSteps === 16 ? 32 : 8;
    setNumSteps(newSteps);
    setGrid(initGrid(numSlices, newSteps));
    setReverse(Array(newSteps).fill(false));
  },[numSteps, numSlices]);

  const setCellProb = useCallback((step,slice)=>{
    setGrid(prev=>{
      const next=prev.map(r=>[...r]),row=next[step];
      let nv=row[slice]===0?0.25:row[slice]>=0.95?0:Math.min(1,row[slice]+0.15);
      row[slice]=nv;
      const t=row.reduce((a,b)=>a+b,0);
      if(t>0)for(let i=0;i<row.length;i++)row[i]=row[i]/t;
      next[step]=row; return next;
    });
  },[]);

  const toggleReverse = useCallback(step=>{
    setReverse(prev=>{const n=[...prev];n[step]=!n[step];return n;});
  },[]);

  function pickSlice(sp){
    const cv=chaosRef.current;
    const m=sp.map(p=>Math.max(0,p+(Math.random()-0.5)*2*cv));
    const t=m.reduce((a,b)=>a+b,0);
    if(t===0)return Math.floor(Math.random()*m.length);
    let r=Math.random()*t;
    for(let i=0;i<m.length;i++){r-=m[i];if(r<=0)return i;}
    return m.length-1;
  }

  function playSlice(ctx,buffer,si,ns,when,dur,rev){
    const sl=buffer.length/ns,st=Math.floor(si*sl),en=Math.floor(st+sl);
    const sb=ctx.createBuffer(buffer.numberOfChannels,en-st,buffer.sampleRate);
    for(let ch=0;ch<buffer.numberOfChannels;ch++){
      const s=buffer.getChannelData(ch),d=sb.getChannelData(ch);
      for(let i=0;i<d.length;i++)d[i]=rev?s[en-1-i]:s[st+i];
    }
    const src=ctx.createBufferSource();src.buffer=sb;src.connect(gainRef.current);src.start(when,0,dur);
  }

  const startPlayback = useCallback(()=>{
    if(!audioBufferRef.current)return;
    const ctx=getAudioContext();setIsPlaying(true);stepRef.current=0;
    let nst=ctx.currentTime+0.05;
    function sched(){
      const buf=audioBufferRef.current;
      if(!buf){schedulerRef.current=setTimeout(sched,25);return;}
      const sd=(60/bpmRef.current)/4;
      while(nst<ctx.currentTime+0.1){
        const s=stepRef.current,sw=s%2===1?sd*swingRef.current*0.33:0;
        const pr=gridRef.current[s],ch=pickSlice(pr),rv=reverseRef.current[s];
        playSlice(ctx,buf,ch,gridRef.current[0].length,nst+sw,sd+sw,rv);
        setCurrentStep(s);setLastPickedSlice(ch);
        stepRef.current=(s+1)%numStepsRef.current;nst+=sd;
      }
      schedulerRef.current=setTimeout(sched,25);
    }
    sched();
  },[]);

  const stopPlayback = useCallback(()=>{
    setIsPlaying(false);setCurrentStep(-1);
    if(schedulerRef.current)clearTimeout(schedulerRef.current);
  },[]);

  const navigateBreak = useCallback((dir)=>{
    if(activeSharedId){
      const idx=sharedLibrary.findIndex(x=>x.file===activeSharedId);
      if(idx===-1)return;
      selectFromShared(sharedLibrary[(idx+dir+sharedLibrary.length)%sharedLibrary.length]);
    } else if(activeLibId!=null){
      const idx=library.findIndex(x=>x.id===activeLibId);
      if(idx===-1)return;
      selectFromLibrary(library[(idx+dir+library.length)%library.length]);
    }
  },[activeSharedId,activeLibId,sharedLibrary,library,selectFromShared,selectFromLibrary]);

  const randomize = useCallback(()=>{
    setGrid(prev=>prev.map(row=>normalizeRow(row.map(()=>Math.random()<0.4?0:Math.random()))));
  },[]);
  const resetGrid = useCallback(()=>{setGrid(initGrid(numSlices,numSteps));setReverse(Array(numSteps).fill(false));},[numSlices,numSteps]);
  const fillDiagonal = useCallback(()=>{
    const g=Array.from({length:numSteps},()=>new Array(numSlices).fill(0));
    for(let s=0;s<numSteps;s++)g[s][s%numSlices]=1;setGrid(g);
  },[numSlices,numSteps]);

  const handleWaveformPointerDown = useCallback(e=>{
    if(!waveformContainerRef.current||!rawBuffer)return;
    const rect=waveformContainerRef.current.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;
    const ds=Math.abs(x-cropStart),de=Math.abs(x-cropEnd);
    if(ds<de&&ds<0.06)setDragging('start');
    else if(de<0.06)setDragging('end');
    e.preventDefault();
  },[cropStart,cropEnd,rawBuffer]);

  const handleWaveformPointerMove = useCallback(e=>{
    if(!dragging||!waveformContainerRef.current)return;
    const rect=waveformContainerRef.current.getBoundingClientRect();
    const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    if(dragging==='start')setCropStart(Math.min(x,cropEnd-0.02));
    else setCropEnd(Math.max(x,cropStart+0.02));
  },[dragging,cropStart,cropEnd]);

  const handleWaveformPointerUp = useCallback(()=>setDragging(null),[]);

  useEffect(()=>{
    if(dragging){
      window.addEventListener('pointermove',handleWaveformPointerMove);
      window.addEventListener('pointerup',handleWaveformPointerUp);
      return()=>{window.removeEventListener('pointermove',handleWaveformPointerMove);window.removeEventListener('pointerup',handleWaveformPointerUp);};
    }
  },[dragging,handleWaveformPointerMove,handleWaveformPointerUp]);

  const handleWaveformWheel = useCallback(e=>{
    if(!rawBuffer||!waveformContainerRef.current)return;
    e.preventDefault();
    const rect=waveformContainerRef.current.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;
    const ds=Math.abs(x-cropStart),de=Math.abs(x-cropEnd);
    const delta=e.deltaY>0?0.005:-0.005;
    if(ds<de)setCropStart(prev=>Math.max(0,Math.min(prev+delta,cropEnd-0.02)));
    else setCropEnd(prev=>Math.min(1,Math.max(prev+delta,cropStart+0.02)));
  },[rawBuffer,cropStart,cropEnd]);

  useEffect(()=>{
    const el=waveformContainerRef.current;
    if(!el)return;
    el.addEventListener('wheel',handleWaveformWheel,{passive:false});
    return()=>el.removeEventListener('wheel',handleWaveformWheel);
  },[handleWaveformWheel]);

  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.code==='Space'){e.preventDefault();if(isPlayingRef.current)stopPlayback();else if(audioBufferRef.current)startPlayback();}
      if(e.code==='ArrowRight'){e.preventDefault();navigateBreak(1);}
      if(e.code==='ArrowLeft'){e.preventDefault();navigateBreak(-1);}

          }}>
            <div style={{

              PROBABILITY BREAK REMIXER
            </div>
            {fileName && (
              <div style={{
                fontSize:10, color:`${C.lcd}99`,
                textShadow:`0 0 6px ${C.lcd}44`,
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                letterSpacing:1,
              }}>▶ {fileName}</div>
            )}
          </div>

          {/* Nav + status */}
          <div style={{display:'flex', flexDirection:'column', gap:6, justifyContent:'space-between'}}>
            <div style={{display:'flex', gap:4}}>
              {hwBtn('◄', ()=>navigateBreak(-1))}
              {hwBtn('►', ()=>navigateBreak(1))}
            </div>
            {isPlaying && (
              <div style={{
                background: C.lcdBg,

            }}>
              {audioBuffer ? 'ADD FILES' : 'LOAD BREAKS'}
              <input type="file" accept="audio/*" multiple onChange={handleFile} style={{display:'none'}} />
            </label>

            <span style={{color:C.textDim, fontSize:9}}>OR</span>

            <button onClick={isRecording?stopRecording:startRecording} style={{
              padding:'8px 14px',
              background: isRecording ? '#2a0505' : 'linear-gradient(to bottom,#252525,#1a1a1a)',
              color: isRecording ? C.ledRed : C.text,
              border: `1px solid ${isRecording ? '#660000' : C.border}`,
              borderBottom:'2px solid #080808', borderRight:'2px solid #080808',
              borderRadius:2, cursor:'pointer', fontSize:10, letterSpacing:1.5,
              textShadow: isRecording ? `0 0 8px ${C.ledRed}88` : 'none',
              animation: isRecording ? 'recPulse 1s ease-in-out infinite' : 'none',
              boxShadow: isRecording ? `0 0 8px #ff220044` : '1px 1px 0 #080808',
            }}>
              {isRecording ? `■ STOP (${recSeconds}s)` : '● REC'}
            </button>

            {audioBuffer && hwBtn(isPreviewing ? '■ STOP' : '▶ PREVIEW', togglePreview, {active:isPreviewing, activeColor:C.accent})}

            {(activeLibId!=null||activeSharedId!=null) && audioBuffer && hwBtn(
              savedFlash ? '✓ SAVED' : 'SAVE STATE',
              saveBreakState,
              {active:savedFlash, activeColor:C.ledGreen}
            )}

            {audioBuffer && hwBtn(
              copiedConfig ? '✓ CFG LOCK' : 'COPY CFG',
              ()=>setCopiedConfig(copiedConfig?null:{cropStart,cropEnd,numSlices,numSteps}),
              {active:!!copiedConfig, activeColor:C.cyan}
            )}

            {audioBuffer && (
              <span style={{color:C.textDim, fontSize:9, marginLeft:'auto', letterSpacing:1}}>
                {audioBuffer.duration.toFixed(2)}S {audioBuffer.sampleRate}HZ
              </span>
            )}
          </div>

          {/* Waveform / oscilloscope */}
          {waveformData && (
            <div ref={waveformContainerRef} onPointerDown={handleWaveformPointerDown}
              style={{position:'relative', cursor:dragging?'ew-resize':'default', touchAction:'none'}}>
              <svg width="100%" height="88" viewBox="0 0 600 88" preserveAspectRatio="none"
                style={{display:'block', border:`1px solid #0e280e`, boxShadow:`inset 0 0 30px #000800`}}>
                <rect width={600} height={88} fill={C.lcdBg}/>
                {/* CRT scanlines */}
                {Array.from({length:22}).map((_,i)=>(
                  <line key={i} x1={0} y1={i*4} x2={600} y2={i*4} stroke="#000" strokeWidth={0.5} opacity={0.35}/>
                ))}
                {/* Dim out-of-crop */}
                <rect x={0} y={0} width={cropStart*600} height={88} fill="rgba(0,0,0,0.78)"/>
                <rect x={cropEnd*600} y={0} width={(1-cropEnd)*600} height={88} fill="rgba(0,0,0,0.78)"/>
                {/* Waveform */}
                {waveformData.map((v,i)=>{
                  const frac=i/waveformData.length;
                  const inC=frac>=cropStart&&frac<=cropEnd;
                  const x=frac*600;
                  const h=Math.max(0.5,v*78);
                  return <rect key={i} x={x} y={44-v*39} width={Math.max(1,600/waveformData.length-0.3)} height={h}
                    fill={inC?C.lcd:'#1a5a2a'} opacity={inC?0.82:0.3}/>;
                })}
                {/* Slice markers */}
                {Array.from({length:numSlices+1}).map((_,i)=>{
                  const f=cropStart+(i/numSlices)*(cropEnd-cropStart);
                  return <line key={i} x1={f*600} y1={0} x2={f*600} y2={88}
                    stroke={C.accent} strokeWidth={0.5} opacity={0.35}/>;
                })}
                {/* Center line */}
                <line x1={0} y1={44} x2={600} y2={44} stroke={C.lcdDim} strokeWidth={0.5} opacity={0.5}/>
                {/* Crop handles */}
                <line x1={cropStart*600} y1={0} x2={cropStart*600} y2={88} stroke={C.accent} strokeWidth={1.5} opacity={0.9}/>
                <line x1={cropEnd*600} y1={0} x2={cropEnd*600} y2={88} stroke={C.accent} strokeWidth={1.5} opacity={0.9}/>
                <circle cx={cropStart*600} cy={4} r={3} fill={C.accent} opacity={0.9}/>
                <circle cx={cropStart*600} cy={84} r={3} fill={C.accent} opacity={0.9}/>
                <circle cx={cropEnd*600} cy={4} r={3} fill={C.accent} opacity={0.9}/>
                <circle cx={cropEnd*600} cy={84} r={3} fill={C.accent} opacity={0.9}/>
                <rect x={cropStart*600-8} y={0} width={16} height={88} fill="transparent" style={{cursor:'ew-resize'}}/>
                <rect x={cropEnd*600-8} y={0} width={16} height={88} fill="transparent" style={{cursor:'ew-resize'}}/>
              </svg>
              {(cropStart>0||cropEnd<1)&&rawBuffer&&(
                <div style={{position:'absolute',bottom:4,right:6,fontSize:8,color:C.lcdMid,letterSpacing:1}}>
                  {(cropStart*rawBuffer.duration).toFixed(2)}S — {(cropEnd*rawBuffer.duration).toFixed(2)}S
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── CONTROLS ROW ── */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))', gap:8, marginBottom:10}}>

          {/* BPM */}
          <div style={{background:C.panelDark,border:`1px solid ${C.border}`,borderTop:`1px solid ${C.borderHi}`,borderLeft:`1px solid ${C.borderHi}`,borderRadius:2,padding:'10px 12px',boxShadow:'2px 2px 0 #080808'}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:2,marginBottom:5}}>BPM</div>
            <div style={{background:C.lcdBg,border:'1px solid #0e280e',padding:'3px 8px',marginBottom:8,textAlign:'right',fontSize:17,color:C.lcd,textShadow:`0 0 8px ${C.lcd}55`,boxShadow:'inset 0 0 12px #000a00',letterSpacing:2}}>{bpm}</div>
            <input type="range" min={60} max={200} step={1} value={bpm} onChange={e=>setBpm(+e.target.value)} />
          </div>

          {/* SLICES */}
          <div style={{background:C.panelDark,border:`1px solid ${C.border}`,borderTop:`1px solid ${C.borderHi}`,borderLeft:`1px solid ${C.borderHi}`,borderRadius:2,padding:'10px 12px',boxShadow:'2px 2px 0 #080808'}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:2,marginBottom:5}}>SLICES</div>
            <div style={{background:C.lcdBg,border:'1px solid #0e280e',padding:'3px 8px',marginBottom:8,textAlign:'right',fontSize:17,color:C.lcd,textShadow:`0 0 8px ${C.lcd}55`,boxShadow:'inset 0 0 12px #000a00',letterSpacing:2}}>{numSlices}</div>
            <input type="range" min={4} max={32} step={1} value={numSlices} onChange={e=>handleSlicesChange(+e.target.value)} />
            <div style={{display:'flex',gap:3,marginTop:6}}>
              {[4,8,16,32].map(n=>(
                <button key={n} onClick={()=>handleSlicesChange(n)} style={{
                  flex:1,padding:'3px 0',fontSize:8,
                  background:numSlices===n?C.lcdBg:'transparent',
                  color:numSlices===n?C.lcd:C.textDim,
                  border:`1px solid ${numSlices===n?'#1a4a1a':C.border}`,
                  borderRadius:1,cursor:'pointer',fontFamily:'inherit',
                  textShadow:numSlices===n?`0 0 5px ${C.lcd}55`:'none',
                }}>{n}</button>
              ))}
            </div>
          </div>

          {/* SWING */}
          <div style={{background:C.panelDark,border:`1px solid ${C.border}`,borderTop:`1px solid ${C.borderHi}`,borderLeft:`1px solid ${C.borderHi}`,borderRadius:2,padding:'10px 12px',boxShadow:'2px 2px 0 #080808'}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:2,marginBottom:5}}>SWING</div>
            <div style={{background:C.lcdBg,border:'1px solid #0e280e',padding:'3px 8px',marginBottom:8,textAlign:'right',fontSize:17,color:C.lcd,textShadow:`0 0 8px ${C.lcd}55`,boxShadow:'inset 0 0 12px #000a00',letterSpacing:2}}>{Math.round(swing*100)}<span style={{fontSize:10,marginLeft:2,color:C.lcdMid}}>%</span></div>
            <input type="range" min={0} max={1} step={0.01} value={swing} onChange={e=>setSwing(+e.target.value)} />
          </div>

          {/* CHAOS */}
          <div style={{background:C.panelDark,border:`1px solid ${C.border}`,borderTop:`1px solid ${C.borderHi}`,borderLeft:`1px solid ${C.borderHi}`,borderRadius:2,padding:'10px 12px',boxShadow:'2px 2px 0 #080808'}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:2,marginBottom:5}}>CHAOS</div>
            <div style={{background:C.lcdBg,border:'1px solid #0e280e',padding:'3px 8px',marginBottom:8,textAlign:'right',fontSize:17,color:C.lcd,textShadow:`0 0 8px ${C.lcd}55`,boxShadow:'inset 0 0 12px #000a00',letterSpacing:2}}>{Math.round(chaos*100)}<span style={{fontSize:10,marginLeft:2,color:C.lcdMid}}>%</span></div>
            <input type="range" min={0} max={1} step={0.01} value={chaos} onChange={e=>setChaos(+e.target.value)} />
          </div>

          {/* VOL */}
          <div style={{background:C.panelDark,border:`1px solid ${C.border}`,borderTop:`1px solid ${C.borderHi}`,borderLeft:`1px solid ${C.borderHi}`,borderRadius:2,padding:'10px 12px',boxShadow:'2px 2px 0 #080808'}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:2,marginBottom:5}}>VOL</div>
            <div style={{background:C.lcdBg,border:'1px solid #0e280e',padding:'3px 8px',marginBottom:8,textAlign:'right',fontSize:17,color:C.lcd,textShadow:`0 0 8px ${C.lcd}55`,boxShadow:'inset 0 0 12px #000a00',letterSpacing:2}}>{Math.round(volume*100)}<span style={{fontSize:10,marginLeft:2,color:C.lcdMid}}>%</span></div>
            <input type="range" min={0} max={1} step={0.01} value={volume} onChange={e=>setVolume(+e.target.value)} />
          </div>
        </div>

        {/* ── TRANSPORT ── */}
        <div style={{display:'flex', gap:6, marginBottom:12, flexWrap:'wrap', alignItems:'center'}}>

          {/* PLAY/STOP — big button */}
          <button onClick={isPlaying?stopPlayback:startPlayback} disabled={!audioBuffer} style={{
            padding:'10px 28px',
            background: isPlaying
              ? 'linear-gradient(to bottom, #2a0a0a, #1e0808)'
              : audioBuffer
                ? 'linear-gradient(to bottom, #0a2a12, #071e0c)'
                : 'linear-gradient(to bottom, #1a1a1a, #141414)',
            color: isPlaying ? C.ledRed : audioBuffer ? C.ledGreen : C.textDim,
            border: `1px solid ${isPlaying ? '#550000' : audioBuffer ? '#1a5a28' : C.border}`,
            borderBottom: isPlaying ? '3px solid #2a0000' : audioBuffer ? '3px solid #0a3014' : `2px solid #080808`,
            borderRight: isPlaying ? '3px solid #2a0000' : audioBuffer ? '3px solid #0a3014' : `2px solid #080808`,
            borderRadius: 2,
            fontSize: 12,
            letterSpacing: 2,
            cursor: audioBuffer ? 'pointer' : 'not-allowed',
            opacity: audioBuffer ? 1 : 0.35,
            textShadow: isPlaying ? `0 0 10px ${C.ledRed}88` : audioBuffer ? `0 0 10px ${C.ledGreen}88` : 'none',
            boxShadow: isPlaying
              ? `0 0 12px #ff220033, 1px 1px 0 #080808`
              : audioBuffer ? `0 0 10px #00ff4422, 1px 1px 0 #080808` : '1px 1px 0 #080808',
          }}>
            {isPlaying ? '■ STOP' : '▶ PLAY'}
          </button>

          {hwBtn('RANDOM', randomize)}
          {hwBtn('DIAGONAL', fillDiagonal)}
          {hwBtn(
            `${numSteps} STEPS`, toggleSteps,
            {active: numSteps!==16, activeColor: numSteps===8 ? C.cyan : C.accent}
          )}
          {hwBtn('RESET', resetGrid)}

          <button onClick={isCapturing?stopCapture:startCapture} disabled={!isPlaying&&!isCapturing} style={{
            padding:'10px 14px',
            background: isCapturing ? '#2a0505' : 'linear-gradient(to bottom,#252525,#1a1a1a)',
            color: isCapturing ? C.ledRed : C.text,
            border: `1px solid ${isCapturing ? '#660000' : C.border}`,
            borderBottom:'2px solid #080808', borderRight:'2px solid #080808',
            borderRadius:2, fontSize:10, letterSpacing:1.5,
            cursor: (isPlaying||isCapturing) ? 'pointer' : 'not-allowed',
            opacity: (isPlaying||isCapturing) ? 1 : 0.35,
            marginLeft:'auto',
            textShadow: isCapturing ? `0 0 8px ${C.ledRed}88` : 'none',
            animation: isCapturing ? 'recPulse 1s ease-in-out infinite' : 'none',
            boxShadow: isCapturing ? `0 0 8px #ff220033` : '1px 1px 0 #080808',
          }}>
            {isCapturing ? `■ SAVE (${captureSeconds}s)` : '⏺ EXPORT'}
          </button>
        </div>

        {/* ── PROBABILITY MATRIX ── */}
        <div style={{
          background: C.panelDark,
          border: `1px solid ${C.border}`,
          borderTop: `1px solid ${C.borderHi}`,
          borderLeft: `1px solid ${C.borderHi}`,
          borderRadius: 2,
          padding: '12px 12px 10px',
          overflowX: 'auto',
          boxShadow: '2px 2px 0 #080808',
        }}>
          <div style={{fontSize:8, color:C.textDim, marginBottom:8, letterSpacing:2}}>
            PROBABILITY MATRIX — ROWS = SLICES · COLS = STEPS · COLS NORMALIZE TO 100%
          </div>

          {/* Step headers */}
          <div style={{display:'flex', gap:2, marginBottom:3, paddingLeft:36}}>
            {Array.from({length:numSteps}).map((_,step)=>(
              <div key={step} style={{
                width: numSteps>16?17:22, minWidth: numSteps>16?17:22,
                textAlign:'center', fontSize:8,
                color: currentStep===step ? C.accent : C.textDim,
                textShadow: currentStep===step ? `0 0 6px ${C.accent}88` : 'none',
                fontWeight: currentStep===step ? 700 : 400,
                marginLeft: numSteps>16&&step===16 ? 6 : 0,
              }}>{step+1}</div>
            ))}
          </div>

          {/* Slice rows */}
          {Array.from({length:numSlices}).map((_,slice)=>(
            <div key={slice} style={{display:'flex', gap:2, alignItems:'center', marginBottom:2}}>
              <div style={{width:32,minWidth:32,textAlign:'right',paddingRight:6,fontSize:9,color:C.warm,letterSpacing:0.5}}>
                S{slice+1}
              </div>
              {grid.map((row,step)=>{
                const prob=row[slice];
                const isActiveCell=currentStep===step&&lastPickedSlice===slice;
                const cellW = numSteps>16?17:22;
                return (
                  <div key={step} onClick={()=>setCellProb(step,slice)} style={{
                    width:cellW, minWidth:cellW, height:22,
                    background: isActiveCell
                      ? `rgba(255,140,0,0.45)`
                      : heatColor(prob),
                    border: `1px solid ${isActiveCell ? C.accent : prob>0 ? '#3a2800' : '#1a1a1a'}`,
                    borderTop: `1px solid ${prob>0 ? '#2a2000' : '#202020'}`,
                    borderLeft: `1px solid ${prob>0 ? '#2a2000' : '#202020'}`,
                    borderRadius: 1,
                    cursor: 'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize: 7,
                    color: isActiveCell ? '#fff' : prob>0.6 ? '#ffdd88' : prob>0 ? '#aa7700' : C.textDim,
                    userSelect:'none',
                    boxShadow: isActiveCell
                      ? `0 0 6px ${C.accent}99, inset -1px -1px 2px #000`
                      : prob>0
                        ? `0 0 ${Math.round(prob*5)}px rgba(255,160,0,${prob*0.35}), inset -1px -1px 2px #000`
                        : 'inset 1px 1px 2px #000, inset -1px -1px 1px #181818',
                    marginLeft: numSteps>16&&step===16 ? 6 : 0,
                  }}>
                    {prob>0.04 ? Math.round(prob*100) : ''}
                  </div>
                );
              })}
            </div>
          ))}

          {/* REV row */}
          <div style={{display:'flex', gap:2, alignItems:'center', marginTop:6, paddingTop:6, borderTop:`1px solid ${C.border}`}}>
            <div style={{width:32,minWidth:32,textAlign:'right',paddingRight:6,fontSize:9,color:C.textDim}}>REV</div>
            {Array.from({length:numSteps}).map((_,step)=>(
              <div key={step} onClick={()=>toggleReverse(step)} style={{
                width: numSteps>16?17:22, minWidth: numSteps>16?17:22, height:22,
                background: reverse[step] ? '#1a0800' : 'transparent',
                border: `1px solid ${reverse[step] ? '#3a1800' : '#1a1a1a'}`,
                borderRadius:1, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:10,
                color: reverse[step] ? C.warm : C.textDim,
                userSelect:'none',
                textShadow: reverse[step] ? `0 0 5px ${C.warm}66` : 'none',
                boxShadow: reverse[step]
                  ? `0 0 4px rgba(255,100,0,0.3), inset -1px -1px 2px #000`
                  : 'inset 1px 1px 2px #000, inset -1px -1px 1px #181818',
                marginLeft: numSteps>16&&step===16 ? 6 : 0,
              }}>
                {reverse[step] ? '◄' : ''}
              </div>
            ))}
          </div>
        </div>

        {/* Footer */}
        <div style={{marginTop:12, fontSize:8, color:C.textDim, letterSpacing:1, lineHeight:2}}>
          LIBRARY PERSISTS IN BROWSER · DRAG AMBER HANDLES TO CROP · EACH COLUMN SUMS TO 100% · EXPORT CAPTURES OUTPUT AS WAV
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
